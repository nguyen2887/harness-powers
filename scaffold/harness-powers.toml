# harness-powers model hints — committed, per-repo.
#
# Reviewers and explorers run as SEPARATE panes/sessions (not auto-invoked
# sub-processes). These values only HINT which model + settings to run in the
# reviewer pane (e.g. Codex) and the explorer pane (e.g. agy). Missing file,
# section, or key = that pane just uses the CLI's own defaults. Edit freely; no
# other step needed.

[review]
# Suggested model for the reviewer pane — plan-review (after designing) and
# code-review (in done). Run it read-only; it never writes Harness state. After
# it passes, the orchestrator records the approval:
#   harness-cli intervention add --story <id> --type approval --source reviewer ...
model = "gpt-5.5"
# Reasoning effort for that model: minimal | low | medium | high (model-dependent).
reasoning_effort = "high"
# Sandbox to run the reviewer pane in: read-only | workspace-write | danger-full-access
sandbox = "read-only"

[explore]
# Suggested model for an on-demand explorer pane (wide, cheap repo reads).
# Run `agy models` to list available model names; use the display name as shown.
model = "Gemini 3.5 Flash (Medium)"
